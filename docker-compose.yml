# OpenNapse Self-Host Docker Compose
#
# This serves the static frontend behind nginx. For the full cloud experience
# (auth, teams, AI gateway), you'll also need a Supabase instance — either
# Supabase Cloud or the self-hosted Supabase Docker stack.
#
# Usage:
#   docker compose up --build
#   Open http://localhost:8080
#
# The app runs in local-only mode by default. To enable cloud features,
# set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY at build time.

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
