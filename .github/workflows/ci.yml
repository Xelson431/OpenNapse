name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:run
      - run: pnpm build

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.0
      - run: pnpm install --frozen-lockfile
      - run: supabase start
      - run: supabase db reset
      - name: Run RLS integration suite
        shell: bash
        run: |
          supabase status -o env > /tmp/opennapse-supabase.env
          source /tmp/opennapse-supabase.env
          SUPABASE_TEST_URL="$API_URL" \
          SUPABASE_TEST_ANON_KEY="$ANON_KEY" \
          SUPABASE_TEST_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY" \
          pnpm --filter @opennapse/web exec vitest run src/db/rls.integration.test.ts
